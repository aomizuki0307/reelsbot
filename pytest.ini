[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=src/reelsbot
    --cov-report=term-missing
    --cov-report=html
    --cov-report=json
    --strict-markers
asyncio_mode = auto
markers =
    unit: Unit tests (isolated component tests)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (complete pipeline)
    slow: Slow tests (may take >1 second)
    requires_ffmpeg: Tests requiring FFmpeg installation
    requires_api: Tests requiring external API (LLM)
